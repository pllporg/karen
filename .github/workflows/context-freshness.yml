name: Context Freshness Check

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  handoff-freshness:
    if: ${{ secrets.LINEAR_API_TOKEN != '' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate handoff freshness and evidence discipline
        env:
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          LINEAR_TEAM_KEY: ${{ vars.LINEAR_TEAM_KEY }}
          LINEAR_PROJECT_NAME: ${{ vars.LINEAR_PROJECT_NAME }}
          LINEAR_SCOPE_LABEL: ${{ vars.LINEAR_SCOPE_LABEL }}
        run: node tools/backlog-sync/check_handoff_freshness.mjs
