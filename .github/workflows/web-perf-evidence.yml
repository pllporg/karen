name: Web Runtime Stability and Perf Evidence

on:
  workflow_dispatch:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    paths:
      - 'apps/web/**'
      - 'tools/perf/**'
      - 'package.json'
      - '.github/workflows/web-perf-evidence.yml'
  push:
    branches: ['main', 'master']
    paths:
      - 'apps/web/**'
      - 'tools/perf/**'
      - 'package.json'
      - '.github/workflows/web-perf-evidence.yml'

jobs:
  web-perf-evidence:
    name: web-perf-evidence
    runs-on: ubuntu-latest
    env:
      WEB_BASE_URL: http://localhost:3000
      API_BASE_URL: http://localhost:4000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install
      - run: pnpm perf:web:evidence -- --out-dir artifacts/perf

      - name: Upload web perf evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-perf-evidence
          path: artifacts/perf
          if-no-files-found: error
