name: UI Regression and Rollout Gates

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  ui-rollout-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Validate UI checklist + screenshot evidence for UI changes
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body || '';
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const touchesUi = files.some((file) => {
              return (
                file.filename.startsWith('apps/web/') ||
                file.filename.startsWith('brand/') ||
                file.filename.startsWith('docs/UI_')
              );
            });

            core.info(`UI files changed: ${touchesUi ? 'yes' : 'no'}`);
            if (!touchesUi) {
              return;
            }

            const missing = [];
            if (!/##\s*UI Interaction Checklist/i.test(body)) {
              missing.push('Missing PR section: "## UI Interaction Checklist".');
            }
            if (!/##\s*Screenshot Evidence/i.test(body)) {
              missing.push('Missing PR section: "## Screenshot Evidence".');
            }
            if (!/No console errors/i.test(body)) {
              missing.push('UI checklist must include "No console errors" evidence.');
            }

            if (missing.length > 0) {
              core.setFailed(missing.join('\n'));
            }

  ui-regression:
    runs-on: ubuntu-latest
    needs: ui-rollout-evidence
    env:
      WEB_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install
      - run: pnpm ui:contract:check
      - run: pnpm --filter web test:regression
      - run: pnpm --filter web build
